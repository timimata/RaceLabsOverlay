name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Quando criares uma tag tipo v0.1.0, v1.0.0, etc.
  workflow_dispatch:  # Ou manualmente pelo botão

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: 📦 Restore packages
      run: dotnet restore
    
    - name: 🔨 Build
      run: dotnet build --configuration Release --no-restore
    
    - name: 📦 Publish Single File
      run: |
        dotnet publish RaceLabsOverlay.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -o "publish"
    
    - name: 📁 List publish directory
      run: dir publish/
    
    - name: 📦 Create ZIP
      run: |
        Compress-Archive -Path "publish\*" -DestinationPath "RaceLabsOverlay.zip" -Force
    
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RaceLabsOverlay-Windows
        path: RaceLabsOverlay.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: 📥 Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: RaceLabsOverlay-Windows
    
    - name: 📝 Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: 🚀 Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: RaceLabsOverlay.zip
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🏎️ RaceLabs Overlay ${{ steps.get_version.outputs.VERSION }}
          
          ### 📥 Download
          Download `RaceLabsOverlay.zip`, extrai e corre `RaceLabsOverlay.exe`
          
          ### ✨ What's New
          - Professional iRacing telemetry overlay
          - 9 customizable widgets
          - Ghost racing system
          - Auto-update support
          
          ### 🖥️ System Requirements
          - Windows 10/11 (64-bit)
          - iRacing installed
          - No .NET Runtime needed (self-contained!)
          
          ### 🚀 Quick Start
          1. Download and extract the ZIP
          2. Run `RaceLabsOverlay.exe`
          3. Open iRacing
          4. The overlay appears automatically!
          
          ### 📖 Documentation
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for more info.
          
          ### 🐛 Issues?
          Report bugs at [Issues](https://github.com/${{ github.repository }}/issues)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

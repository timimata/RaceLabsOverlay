name: Build RaceLabsOverlay

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build Release
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish Application
      run: dotnet publish RaceLabsOverlay.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
          
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RaceLabsOverlay-Release
        path: ./publish/